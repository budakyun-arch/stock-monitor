name: Daily price collection

on:
  schedule:
    # 19:00 KST (10:00 UTC) every day — KRX 마감 후 충분히 시간 둔 시점
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      basDt:
        description: '특정 날짜 강제 수집 (YYYYMMDD, 비우면 전날)'
        required: false
        type: string

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Collect daily prices
        env:
          SERVICE_KEY: ${{ secrets.SERVICE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/daily.js ${{ inputs.basDt }}
